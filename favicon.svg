<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f20"/>
      <stop offset="100%" stop-color="#151829"/>
    </linearGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#ff2d8a"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#ff2d8a"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer border ring with gradient -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none"
        stroke="url(#border)" stroke-width="2.5" opacity="0.9"/>

  <!-- Bookmark shape — SOLID gradient fill, full opacity -->
  <path d="M16 10 L48 10 L48 56 L32 45 L16 56 Z"
        fill="url(#icon)"
        stroke="none"/>

  <!-- White highlight lines on top portion for depth -->
  <line x1="22" y1="18" x2="42" y2="18"
        stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="22" y1="24" x2="38" y2="24"
        stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>