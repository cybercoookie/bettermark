<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07080f"/>
      <stop offset="100%" stop-color="#0f1122"/>
    </linearGradient>
    <!-- Icon gradient: cyan → magenta -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#ff2d8a"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle inner border glow -->
  <rect width="62" height="62" x="1" y="1" rx="13" ry="13"
        fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>

  <!-- Bookmark shape — filled with gradient, glowing -->
  <path d="M18 12 L46 12 L46 54 L32 44 L18 54 Z"
        fill="url(#grad)" opacity="0.18"
        stroke="url(#grad)" stroke-width="2"
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Inner bookmark accent line -->
  <line x1="24" y1="20" x2="40" y2="20"
        stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="25" x2="36" y2="25"
        stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>