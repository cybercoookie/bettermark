[build]
  publish = "."
  command = ""

[[redirects]]
  from  = "http://*"
  to    = "https://:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy      = "default-src 'self'; script-src 'nonce-BM2025NONCE' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src https://www.google.com data: blob:; connect-src https://*.supabase.co https://*.supabase.com wss://*.supabase.co https://api.anthropic.com; base-uri 'none'; object-src 'none'; form-action 'none';"
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "DENY"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
